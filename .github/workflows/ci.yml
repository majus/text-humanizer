name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: PR2 analysis smoke
        run: npm run papers:analyze -- --config data/papers/analysis.smoke.config.json --run-id ci-pr2-smoke

      - name: PR2 integrity + schema gate
        run: npm run test:pr2-integrity

      - name: PR3 benchmark smoke
        run: npm run papers:benchmark -- --config data/papers/benchmark.smoke.config.json --run-id ci-pr3-smoke

      - name: Model training smoke
        run: npm run model:train -- --config data/models/train.smoke.config.json --run-id ci-pr4-smoke

      - name: Model gate validation
        run: npm run model:eval -- --manifest data/models/current/run.manifest.json

      - name: Integration smoke
        run: npm run test:integration
        env:
          NEXT_TELEMETRY_DISABLED: 1

  build:
    runs-on: ubuntu-latest
    needs: lint-and-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
