name: CI - Quality Gates

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  dataset-and-training-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: PR3 benchmark smoke
        run: npm run papers:benchmark -- --config data/papers/benchmark.smoke.config.json --run-id ci-pr3-smoke
      - name: PR4 training smoke + quality gate
        run: npm run model:train -- --config data/models/train.smoke.config.json --run-id ci-pr4-smoke
      - name: PR4 gate check
        run: npm run model:eval -- --manifest data/models/current/run.manifest.json
      - name: Integration smoke
        run: npm run test:integration

  build:
    runs-on: ubuntu-latest
    needs: dataset-and-training-smoke
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
