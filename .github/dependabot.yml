version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    ignore:
      # eslint v10 is incompatible with eslint-plugin-react used by eslint-config-next.
      # Keep ESLint pinned to v9 until eslint-config-next officially supports v10.
      - dependency-name: "eslint"
        versions: [">= 10.0.0"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - github-actions
